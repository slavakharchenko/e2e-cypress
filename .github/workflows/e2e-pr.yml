name: E2E PR Check

on:
  pull_request:
    branches: [main]

jobs:
  e2e:
    uses: ./.github/workflows/e2e-base.yml
    with:
      environment: dev

  e2e-gate:
    name: E2E Gate
    runs-on: ubuntu-latest
    needs: e2e
    if: always()
    steps:
      - name: Tests completed
        run: echo "E2E tests finished with status ${{ needs.e2e.result }}"
